version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pipeline_cost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    # 不对外暴露数据库端口，仅 Docker 内网可访问
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    # 不对外暴露，由 frontend nginx 反代 /api/ 访问
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/pipeline_cost
      SECRET_KEY: ${SECRET_KEY:-please-change-this-secret-key}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@baidu.com}
      CORS_ORIGINS: '["https://cost.iwill.cc","http://cost.iwill.cc","http://localhost:3080"]'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3080:80"
    depends_on:
      - backend

volumes:
  pgdata:
